{% extends 'base.html' %}
{% block title %}Create account · Task Manager{% endblock %}
{% block body %}
<div class="container py-5">
  <div class="card app-card auth-card">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <h1 class="h3 brand mb-2">Create account</h1>
        <p class="text-secondary mb-0">Set up a secure workspace for your tasks.</p>
      </div>
      <form method="post" class="row g-3">
        <div class="col-12">
          <label class="form-label">Username</label>
          <input type="text" class="form-control form-control-lg" name="username" required>
        </div>
        <div class="col-12">
          <label class="form-label">Email</label>
          <input type="email" class="form-control form-control-lg" name="email" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Password</label>
          <input type="password" class="form-control form-control-lg" name="password" minlength="8" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Confirm password</label>
          <input type="password" class="form-control form-control-lg" name="confirm_password" minlength="8" required>
        </div>
        <div class="col-12 d-grid">
          <button class="btn btn-primary btn-lg">Create account</button>
        </div>
      </form>
      <p class="text-center text-secondary mt-4 mb-0">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </div>
  </div>
</div>
{% endblock %}
