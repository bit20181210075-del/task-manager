<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تعديل مهمة</title>

  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0d6efd">
  <link rel="apple-touch-icon" href="/static/pwa/icon-192.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4" style="max-width:800px">
    <a href="{{ url_for('index') }}" class="btn btn-link mb-3">← رجوع</a>
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="mb-3">تعديل مهمة</h4>
        <form method="post" class="row g-3">
          <div class="col-12">
            <label class="form-label">العنوان</label>
            <input class="form-control" type="text" name="title" value="{{ task.title }}" required>
          </div>
          <div class="col-12">
            <label class="form-label">الوصف</label>
            <textarea class="form-control" name="description" rows="4">{{ task.description or '' }}</textarea>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label">الأولوية</label>
            <select class="form-select" name="priority">
              <option value="high"   {{ 'selected' if task.priority=='high' else '' }}>عالية</option>
              <option value="medium" {{ 'selected' if task.priority=='medium' else '' }}>متوسطة</option>
              <option value="low"    {{ 'selected' if task.priority=='low' else '' }}>منخفضة</option>
            </select>
          </div>
          <div class="col-6 col-md-5">
            <label class="form-label">تاريخ/وقت الاستحقاق</label>
            <input class="form-control" type="datetime-local" name="due_at"
                   value="{{ task.due_at.strftime('%Y-%m-%dT%H:%M') if task.due_at else '' }}" step="60">
          </div>
          <div class="col-12">
            <button class="btn btn-primary">حفظ</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">إلغاء</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(console.error));
    }
  </script>
</body>
</html>
