<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Task Manager{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--muted:#6b7280;--shadow:0 10px 30px rgba(15,23,42,.08);--radius:20px}
    body{background:linear-gradient(180deg,#f5f7fb 0,#eef3f9 100%);min-height:100vh}
    .app-shell{max-width:1180px;margin:0 auto;padding:24px}
    .app-card{background:var(--card);border:none;border-radius:var(--radius);box-shadow:var(--shadow)}
    .metric{border-radius:18px;padding:18px;background:#fff;box-shadow:var(--shadow)}
    .task-card{border-radius:18px;border:none;box-shadow:var(--shadow);overflow:hidden;height:100%}
    .priority-high{border-top:4px solid #dc3545}.priority-medium{border-top:4px solid #ffc107}.priority-low{border-top:4px solid #198754}
    .line-through{text-decoration:line-through;opacity:.75}
    .page-header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
    .brand{font-weight:700;letter-spacing:-.02em}
    .auth-card{max-width:520px;margin:6vh auto}
    .flash-stack{position:fixed;top:20px;right:20px;z-index:1200;min-width:280px}
    .empty-state{padding:48px 24px;text-align:center;color:var(--muted)}
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="flash-stack">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category if category in ['success','danger','warning','info','primary','secondary'] else 'info' }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>

  {% block body %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    setTimeout(() => document.querySelectorAll('.alert').forEach(el => bootstrap.Alert.getOrCreateInstance(el).close()), 3500);
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
