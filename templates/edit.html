{% extends 'base.html' %}
{% block title %}Edit task · Task Manager{% endblock %}
{% block body %}
<div class="app-shell">
  <div class="page-header mb-4">
    <div>
      <h1 class="h3 mb-1">Edit task</h1>
      <p class="text-secondary mb-0">Update the task details below.</p>
    </div>
    <a class="btn btn-outline-secondary" href="{{ url_for('index') }}"><i class="bi bi-arrow-left"></i> Back</a>
  </div>

  <div class="card app-card">
    <div class="card-body p-4">
      <form method="post" class="row g-3">
        <div class="col-12">
          <label class="form-label">Title</label>
          <input class="form-control" type="text" name="title" value="{{ task.title }}" required>
        </div>
        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea class="form-control" name="description" rows="4">{{ task.description or '' }}</textarea>
        </div>
        <div class="col-md-3">
          <label class="form-label">Priority</label>
          <select class="form-select" name="priority">
            <option value="high" {{ 'selected' if task.priority=='high' else '' }}>High</option>
            <option value="medium" {{ 'selected' if task.priority=='medium' else '' }}>Medium</option>
            <option value="low" {{ 'selected' if task.priority=='low' else '' }}>Low</option>
          </select>
        </div>
        <div class="col-md-5">
          <label class="form-label">Due date & time</label>
          <input class="form-control" type="datetime-local" name="due_at" value="{{ task.due_at.strftime('%Y-%m-%dT%H:%M') if task.due_at else '' }}" step="60">
        </div>
        <div class="col-12 d-flex gap-2 flex-wrap">
          <button class="btn btn-primary">Save changes</button>
          <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
